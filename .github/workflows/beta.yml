name: Beta Build
on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/release.yml'
  workflow_dispatch:
jobs:
  beta-build:
    name: Beta Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3
      - name: Configure Gradle
        run: |
          sed -i "s/2000000000000/$(date +%s%3N)/g" gradle.properties
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            TMessagesProj/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Decode google-services.json
        run: |
          echo $FIREBASE_JSON | base64 --decode > TMessagesProj_App/google-services.json
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
      - name: Gradle Build
        run: |
          export TELEGRAM_APP_ID="${{ secrets.TELEGRAM_APP_ID }}"
          export TELEGRAM_APP_HASH="${{ secrets.TELEGRAM_APP_HASH }}"

          ./gradlew :TMessagesProj_App:assembleRelease --configuration-cache -PabiFilters=arm64-v8a
      - uses: actions/upload-artifact@v4
        with:
          name: Beta
          path: TMessagesProj_App/build/outputs/apk/release/*.apk
