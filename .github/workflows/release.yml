name: Release Build
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload: If want ignore'
        required: false
jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3
      - name: Configure Gradle
        run: |
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            TMessagesProj/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Decode google-services.json
        run: |
          echo $FIREBASE_JSON | base64 --decode > TMessagesProj_App/google-services.json
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
      - name: Decode Keystore
        run: |
          echo $STORE_FILE_BASE64 | base64 --decode > release-key.jks
        env:
          STORE_FILE_BASE64: ${{ secrets.STOREFILE }}
      - name: Gradle Build
        run: |
          export storeFile=$(pwd)/release-key.jks
          export storePassword="${{ secrets.STOREPASSWORD }}"
          export keyAlias="${{ secrets.KEYALIAS }}"
          export keyPassword="${{ secrets.KEYPASSWORD }}"

          export TELEGRAM_APP_ID="${{ secrets.TELEGRAM_APP_ID }}"
          export TELEGRAM_APP_HASH="${{ secrets.TELEGRAM_APP_HASH }}"

          ./gradlew :TMessagesProj_App:assembleRelease --configuration-cache
      - uses: actions/upload-artifact@v4
        with:
          name: Release
          path: TMessagesProj_App/build/outputs/apk/**/*.apk

